name: Build & Release

# Two channels, by branch:
#   main    → production: appId com.jobtracker.app,     label "Job Tracker",
#             publishes Release vX.Y.Z (version from src/version.js).
#   develop → dev build:  appId com.jobtracker.app.dev, label "Job Tracker Dev",
#             publishes a rolling PRE-release tagged "develop".
# Different appIds → both apps can be installed side by side.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   KEYSTORE_BASE64    base64 of jobtracker-release.keystore
#   KEYSTORE_PASSWORD  the keystore password

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Resolve channel + version
        id: cfg
        run: |
          V=$(grep -oE '[0-9]+\.[0-9]+\.[0-9]+' src/version.js | head -1)
          if [ -z "$V" ]; then echo "::error::No semver in src/version.js"; exit 1; fi
          IFS='.' read -r MA MI PA <<< "$V"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "code=$(( MA*10000 + MI*100 + PA ))" >> "$GITHUB_OUTPUT"
          if [ "$GITHUB_REF_NAME" = "develop" ]; then
            echo "channel=dev"                       >> "$GITHUB_OUTPUT"
            echo "appid=com.jobtracker.app.dev"      >> "$GITHUB_OUTPUT"
            echo "label=Job Tracker Dev"             >> "$GITHUB_OUTPUT"
            echo "tag=develop"                       >> "$GITHUB_OUTPUT"
            echo "prerelease=true"                   >> "$GITHUB_OUTPUT"
            echo "relname=Job Tracker Dev v$V (latest)" >> "$GITHUB_OUTPUT"
            # Stable filename → one permanent download link for the latest dev build.
            echo "apk=JobTracker-dev.apk"             >> "$GITHUB_OUTPUT"
          else
            echo "channel=prod"                      >> "$GITHUB_OUTPUT"
            echo "appid=com.jobtracker.app"          >> "$GITHUB_OUTPUT"
            echo "label=Job Tracker"                 >> "$GITHUB_OUTPUT"
            echo "tag=v$V"                           >> "$GITHUB_OUTPUT"
            echo "prerelease=false"                  >> "$GITHUB_OUTPUT"
            echo "relname=Job Tracker v$V"           >> "$GITHUB_OUTPUT"
            echo "apk=JobTracker-v$V.apk"            >> "$GITHUB_OUTPUT"
          fi

      - name: Build release notes from changelog
        env:
          V: ${{ steps.cfg.outputs.version }}
          CH: ${{ steps.cfg.outputs.channel }}
        run: |
          node --input-type=module -e "
            import fs from 'node:fs';
            const m = await import('file://' + process.cwd() + '/src/changelog.js');
            const e = (m.CHANGELOG || []).find(x => x.version === process.env.V);
            const body = e ? e.changes.map(c => '- ' + c).join('\n') : 'See commit history.';
            fs.writeFileSync('RELEASE_NOTES.md', body + '\n');
          "
          # Dev builds embed a build marker so installed dev apps can detect a newer build.
          if [ "$CH" = "dev" ]; then
            printf '\n<!-- build:%s -->\n' "$GITHUB_SHA" >> RELEASE_NOTES.md
          fi
          echo "----- RELEASE_NOTES.md -----"; cat RELEASE_NOTES.md

      - name: Apply version + channel to project
        run: |
          sed -i "s/versionCode .*/versionCode ${{ steps.cfg.outputs.code }}/" android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"${{ steps.cfg.outputs.version }}\"/" android/app/build.gradle
          # Stamp build identity into src/build.js — the in-app updater uses these
          # (CHANNEL picks prod-vs-dev release; BUILD_ID detects a newer dev build).
          sed -i "s/export const CHANNEL = 'prod';/export const CHANNEL = '${{ steps.cfg.outputs.channel }}';/" src/build.js
          sed -i "s/export const BUILD_ID = 'local';/export const BUILD_ID = '${GITHUB_SHA}';/" src/build.js
          if [ "${{ steps.cfg.outputs.channel }}" = "dev" ]; then
            sed -i 's/applicationId "com.jobtracker.app"/applicationId "${{ steps.cfg.outputs.appid }}"/' android/app/build.gradle
            sed -i 's#<string name="app_name">Job Tracker</string>#<string name="app_name">${{ steps.cfg.outputs.label }}</string>#' android/app/src/main/res/values/strings.xml
            sed -i 's#<string name="title_activity_main">Job Tracker</string>#<string name="title_activity_main">${{ steps.cfg.outputs.label }}</string>#' android/app/src/main/res/values/strings.xml
          fi

      - run: npm ci
      - run: npm run build
      - run: npx cap sync android

      - name: Write signing config
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set — add it in Settings → Secrets → Actions"; exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          printf 'storeFile=%s\nstorePassword=%s\nkeyAlias=jobtracker\nkeyPassword=%s\n' \
            "$RUNNER_TEMP/release.keystore" "$KEYSTORE_PASSWORD" "$KEYSTORE_PASSWORD" \
            > android/keystore.properties

      - name: Build signed APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          cp app/build/outputs/apk/release/app-release.apk "$GITHUB_WORKSPACE/${{ steps.cfg.outputs.apk }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.cfg.outputs.apk }}
          path: ${{ steps.cfg.outputs.apk }}
          if-no-files-found: error

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.cfg.outputs.tag }}
          name: ${{ steps.cfg.outputs.relname }}
          prerelease: ${{ steps.cfg.outputs.prerelease }}
          body_path: RELEASE_NOTES.md
          files: ${{ steps.cfg.outputs.apk }}
