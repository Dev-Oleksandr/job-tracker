name: Release (production)

# main is the production branch: every push to main builds a SIGNED release APK
# and publishes (or updates) the GitHub Release for the current version.
# The version is read from src/version.js (APP_VERSION) — bump it to ship a new
# version that phones will be offered as an update.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   KEYSTORE_BASE64    base64 of jobtracker-release.keystore
#   KEYSTORE_PASSWORD  the keystore password

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Read version from src/version.js
        id: ver
        run: |
          V=$(grep -oE '[0-9]+\.[0-9]+\.[0-9]+' src/version.js | head -1)
          if [ -z "$V" ]; then echo "::error::No semver found in src/version.js"; exit 1; fi
          IFS='.' read -r MA MI PA <<< "$V"
          echo "name=$V" >> "$GITHUB_OUTPUT"
          echo "code=$(( MA*10000 + MI*100 + PA ))" >> "$GITHUB_OUTPUT"
          echo "Building version $V (versionCode $(( MA*10000 + MI*100 + PA )))"

      - name: Stamp version into gradle
        run: |
          sed -i "s/versionCode .*/versionCode ${{ steps.ver.outputs.code }}/" android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"${{ steps.ver.outputs.name }}\"/" android/app/build.gradle

      - run: npm ci
      - run: npm run build
      - run: npx cap copy android

      - name: Write signing config
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set — add it in Settings → Secrets → Actions"; exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          printf 'storeFile=%s\nstorePassword=%s\nkeyAlias=jobtracker\nkeyPassword=%s\n' \
            "$RUNNER_TEMP/release.keystore" "$KEYSTORE_PASSWORD" "$KEYSTORE_PASSWORD" \
            > android/keystore.properties

      - name: Build signed release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          cp app/build/outputs/apk/release/app-release.apk "$GITHUB_WORKSPACE/JobTracker-v${{ steps.ver.outputs.name }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: JobTracker-v${{ steps.ver.outputs.name }}
          path: JobTracker-v${{ steps.ver.outputs.name }}.apk
          if-no-files-found: error

      - name: Publish / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.name }}
          name: Job Tracker v${{ steps.ver.outputs.name }}
          files: JobTracker-v${{ steps.ver.outputs.name }}.apk
